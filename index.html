<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杨浦新江湾餐厅推荐</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .vote-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .vote-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .vote-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .name-input {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .name-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .vote-hint {
            color: #666;
            font-size: 0.9rem;
        }

        .vote-hint strong {
            color: #ff9800;
        }

        .vote-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2rem;
        }

        .results-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .results-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .result-rank {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .result-rank-1 {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4a 100%);
            color: #333;
        }

        .result-rank-2 {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            color: #333;
        }

        .result-rank-3 {
            background: linear-gradient(135deg, #cd7f32 0%, #daa06d 100%);
            color: white;
        }

        .result-rank-other {
            background: #e0e0e0;
            color: #666;
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .result-bar {
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .result-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .result-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #666;
        }

        .result-voters {
            margin-top: 5px;
            font-size: 0.8rem;
            color: #888;
        }

        .total-votes {
            text-align: right;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #666;
        }

        .total-votes strong {
            color: #667eea;
            font-size: 1.2rem;
        }

        .restaurants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }

        .restaurant-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .restaurant-card.selected {
            box-shadow: 0 0 0 4px #667eea, 0 15px 50px rgba(0,0,0,0.3);
        }

        .select-checkbox {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: white;
            border: 3px solid #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 10;
            transition: all 0.3s;
        }

        .select-checkbox.checked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: white;
        }

        .restaurant-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .restaurant-content {
            padding: 25px;
        }

        .restaurant-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .restaurant-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
        }

        .cuisine-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .distance-badge {
            background: #ff9800;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 12px;
        }

        .stars {
            color: #ffc107;
            font-size: 1.2rem;
        }

        .rating-text {
            color: #666;
            font-size: 0.95rem;
        }

        .summary {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .feature-tag {
            background: #f0f0f0;
            color: #666;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }

        .address {
            color: #888;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
        }

        .address::before {
            content: "📍";
        }

        .top-dishes-section {
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .top-dishes-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .top-dishes-title::before {
            content: "🔥 ";
        }

        .top-dishes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .dish-item {
            text-align: center;
        }

        .dish-image {
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .dish-name {
            font-size: 0.8rem;
            color: #555;
            font-weight: 500;
        }

        .success-message {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            margin-bottom: 20px;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .restaurants-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ 杨浦新江湾餐厅推荐</h1>
            <p>新江湾/大学路 · 人均150以内 · 适合4人聚餐</p>
        </header>

        <div class="success-message" id="successMessage">
            ✅ 投票成功！感谢您的参与！
        </div>

        <div class="vote-section">
            <h2>🗳️ 投票选择你喜欢的餐厅</h2>
            <div class="vote-form">
                <input type="text" id="voterName" class="name-input" placeholder="请输入你的名字">
                <p class="vote-hint">提示：最多可以选择 <strong>3个</strong> 餐厅，点击餐厅卡片右上角的圆圈进行选择</p>
                <div class="vote-buttons">
                    <button class="btn btn-primary" id="submitVote" onclick="submitVote()">提交投票</button>
                    <button class="btn btn-secondary" onclick="clearSelection()">清空选择</button>
                </div>
            </div>
        </div>

        <div class="results-section">
            <h2>📊 投票结果</h2>
            <div id="resultsContainer">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="restaurants-grid" id="restaurantsGrid">
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ethgnzzyhopqmhzdifkjh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_A0gRsqNhY-24Cun_VU8ixw_o13oflRD';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const restaurants = [
            { 
                id: 1, 
                name: 'xibo 锡伯新疆', 
                emoji: '🇨🇳',
                cuisine: '新疆菜', 
                distance: '0分钟', 
                rating: 4.7, 
                summary: '正宗新疆风味餐厅，大盘鸡、羊肉串、手抓饭应有尽有。环境宽敞明亮，适合朋友聚餐大口吃肉！', 
                features: ['可辣可不辣', '分量足', '适合聚餐'], 
                address: '新江湾', 
                dishes: [
                    {name: '大盘鸡', emoji: '🍗'}, 
                    {name: '羊肉串', emoji: '🍢'}, 
                    {name: '手抓饭', emoji: '🍚'}
                ] 
            },
            { 
                id: 2, 
                name: '山葵烤肉', 
                emoji: '🥩',
                cuisine: '烤肉', 
                distance: '0分钟', 
                rating: 4.6, 
                summary: '新鲜烤肉配山葵酱，肉质鲜嫩美味。环境舒适，自己动手烤肉超有氛围！', 
                features: ['不辣', '有氛围', '新鲜食材'], 
                address: '新江湾', 
                dishes: [
                    {name: '山葵烤肉', emoji: '🥩'}, 
                    {name: '五花肉', emoji: '🥓'}, 
                    {name: '牛五花', emoji: '🥩'}
                ] 
            },
            { 
                id: 3, 
                name: 'need创意韩国料理', 
                emoji: '🇰🇷',
                cuisine: '韩国料理', 
                distance: '5分钟', 
                rating: 4.5, 
                summary: '创意韩国料理，部队锅、烤肉、石锅拌饭都很美味。环境年轻时尚，大学路附近很方便！', 
                features: ['可辣可不辣', '创意料理', '环境时尚'], 
                address: '大学路', 
                dishes: [
                    {name: '部队锅', emoji: '🍲'}, 
                    {name: '韩式烤肉', emoji: '🥩'}, 
                    {name: '石锅拌饭', emoji: '🍚'}
                ] 
            },
            { 
                id: 4, 
                name: '一川二水', 
                emoji: '🍜',
                cuisine: '中餐', 
                distance: '0分钟', 
                rating: 4.4, 
                summary: '精致中餐，口味地道。环境干净整洁，家庭朋友聚餐都合适！', 
                features: ['不辣', '性价比高', '环境干净'], 
                address: '新江湾', 
                dishes: [
                    {name: '招牌菜', emoji: '🍲'}, 
                    {name: '时蔬小炒', emoji: '🥗'}, 
                    {name: '老火靓汤', emoji: '🍲'}
                ] 
            },
            { 
                id: 5, 
                name: '福八izakaya', 
                emoji: '🇯🇵',
                cuisine: '日式居酒屋', 
                distance: '5分钟', 
                rating: 4.6, 
                summary: '温馨日式居酒屋，烧鸟、烤串、小食都很精致。氛围轻松，小酌一杯超惬意！', 
                features: ['不辣', '氛围好', '有酒'], 
                address: '大学路', 
                dishes: [
                    {name: '烧鸟烤串', emoji: '🍢'}, 
                    {name: '日式炸鸡', emoji: '🍗'}, 
                    {name: '铁板料理', emoji: '🥩'}
                ] 
            },
            { 
                id: 6, 
                name: '帕蓝', 
                emoji: '🇹🇭',
                cuisine: '泰国菜', 
                distance: '0分钟', 
                rating: 4.5, 
                summary: '正宗泰国料理，冬阴功、咖喱、芒果糯米饭都很美味。环境充满异域风情！', 
                features: ['可辣可不辣', '异域风情', '香料丰富'], 
                address: '新江湾', 
                dishes: [
                    {name: '冬阴功汤', emoji: '🍲'}, 
                    {name: '泰式咖喱', emoji: '🥘'}, 
                    {name: '芒果糯米饭', emoji: '🍚'}
                ] 
            }
        ];

        let selectedRestaurants = [];
        let votes = [];

        async function loadVotes() {
            const { data, error } = await supabase
                .from('votes')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (error) {
                console.error('加载投票失败:', error);
                votes = [];
            } else {
                votes = data || [];
            }
            renderResults();
        }

        function renderRestaurants() {
            const grid = document.getElementById('restaurantsGrid');
            grid.innerHTML = restaurants.map(r => `
                <div class="restaurant-card" data-id="${r.id}" onclick="toggleSelection(${r.id})">
                    <div class="select-checkbox ${selectedRestaurants.includes(r.id) ? 'checked' : ''}">${selectedRestaurants.includes(r.id) ? '✓' : ''}</div>
                    <div class="restaurant-image">${r.emoji}</div>
                    <div class="restaurant-content">
                        <div class="restaurant-header">
                            <h2 class="restaurant-name">${r.name}</h2>
                            <span class="cuisine-tag">${r.cuisine}</span>
                            <span class="distance-badge">📍 ${r.distance}</span>
                        </div>
                        <div class="rating">
                            <span class="stars">⭐⭐⭐⭐⭐</span>
                            <span class="rating-text">${r.rating}分</span>
                        </div>
                        <p class="summary">${r.summary}</p>
                        <div class="features">
                            ${r.features.map(f => `<span class="feature-tag">${f}</span>`).join('')}
                        </div>
                        <p class="address">${r.address}</p>
                        <div class="top-dishes-section">
                            <h3 class="top-dishes-title">网友推荐 TOP 3</h3>
                            <div class="top-dishes">
                                ${r.dishes.map(d => `
                                    <div class="dish-item">
                                        <div class="dish-image">${d.emoji}</div>
                                        <div class="dish-name">${d.name}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleSelection(id) {
            const index = selectedRestaurants.indexOf(id);
            if (index > -1) {
                selectedRestaurants.splice(index, 1);
            } else {
                if (selectedRestaurants.length >= 3) {
                    alert('最多只能选择3个餐厅哦！');
                    return;
                }
                selectedRestaurants.push(id);
            }
            renderRestaurants();
        }

        function clearSelection() {
            selectedRestaurants = [];
            renderRestaurants();
        }

        async function submitVote() {
            const name = document.getElementById('voterName').value.trim();
            if (!name) {
                alert('请输入你的名字！');
                return;
            }
            if (selectedRestaurants.length === 0) {
                alert('请至少选择1个餐厅！');
                return;
            }

            const btn = document.getElementById('submitVote');
            btn.disabled = true;
            btn.textContent = '提交中...';

            const selectedNames = selectedRestaurants.map(id => restaurants.find(r => r.id === id).name);

            const { error } = await supabase
                .from('votes')
                .insert([
                    { 
                        voter_name: name, 
                        restaurant_ids: selectedNames 
                    }
                ]);

            btn.disabled = false;
            btn.textContent = '提交投票';

            if (error) {
                alert('投票失败，请重试！');
                console.error(error);
                return;
            }

            showSuccessMessage();
            await loadVotes();
            selectedRestaurants = [];
            document.getElementById('voterName').value = '';
            renderRestaurants();
        }

        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function renderResults() {
            const container = document.getElementById('resultsContainer');
            if (votes.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center; padding: 30px;">暂无投票记录，快来成为第一个投票的人吧！</p>';
                return;
            }

            const voteCounts = {};
            const votersByRestaurant = {};
            restaurants.forEach(r => {
                voteCounts[r.name] = 0;
                votersByRestaurant[r.name] = [];
            });

            votes.forEach(v => {
                const restaurantNames = Array.isArray(v.restaurant_ids) ? v.restaurant_ids : v.restaurant_ids;
                restaurantNames.forEach(r => {
                    voteCounts[r] = (voteCounts[r] || 0) + 1;
                    votersByRestaurant[r].push(v.voter_name);
                });
            });

            const sorted = Object.entries(voteCounts)
                .sort((a, b) => b[1] - a[1])
                .filter(([_, count]) => count > 0);

            const maxVotes = Math.max(...sorted.map(([_, count]) => count));

            container.innerHTML = sorted.map(([name, count], index) => {
                const rankClass = index === 0 ? 'result-rank-1' : index === 1 ? 'result-rank-2' : index === 2 ? 'result-rank-3' : 'result-rank-other';
                const percentage = (count / maxVotes * 100).toFixed(0);
                const voters = votersByRestaurant[name].join('、');
                return `
                    <div class="result-item">
                        <div class="result-rank ${rankClass}">${index + 1}</div>
                        <div class="result-info">
                            <div class="result-name">${name}</div>
                            <div class="result-bar">
                                <div class="result-bar-fill" style="width: ${percentage}%;"></div>
                            </div>
                            <div class="result-stats">
                                <span>${count} 票</span>
                                <span>${percentage}%</span>
                            </div>
                            <div class="result-voters">投票者：${voters}</div>
                        </div>
                    </div>
                `;
            }).join('') + `
                <div class="total-votes">
                    总投票人数：<strong>${votes.length}</strong> 人
                </div>
            `;
        }

        renderRestaurants();
        loadVotes();
    </script>
</body>
</html>
